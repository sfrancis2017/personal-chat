name = "chat-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# CORS allowed origins. Add localhost for dev; production is the Pages domain.
[vars]
ALLOWED_ORIGINS = "https://chat.sajivfrancis.com,https://sajivfrancis.com,https://www.sajivfrancis.com,http://localhost:8000,http://127.0.0.1:8000,http://localhost:4321,http://127.0.0.1:4321,http://localhost:3000,http://127.0.0.1:3000"
ANTHROPIC_MODEL = "claude-sonnet-4-6"
# Docs repo default branch. Verified via:
#   curl -s https://api.github.com/repos/sfrancis2017/docs | grep '"default_branch"'
# Worker defaults to "main" if unset; this repo uses "master" (older convention).
DOCS_BRANCH = "master"
# Pre-registered GitHub repos available as grounding sources in the
# /admin/write editor's draft review pipeline. Comma-separated
# "owner/repo" slugs. The editor renders these as a dropdown; the worker
# fetches their READMEs, configs, and core source files via the GitHub
# Contents API on review. Add or remove repos here as the build evolves.
GROUNDING_REPOS = "sfrancis2017/sajivfrancis.github.io-master,sfrancis2017/personal-chat,sfrancis2017/docs,sfrancis2017/ea-explorer-worker"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "df9b1650caba472d8df576b25b893212"

# Artifact store — persists synthesized whitepaper/slides/email bundles from
# the chat surface. Work tools READ from /api/artifacts/* endpoints.
# Create the namespace before first deploy:
#   npx wrangler kv:namespace create ARTIFACTS_KV
# Then replace the id below with the value wrangler prints.
[[kv_namespaces]]
binding = "ARTIFACTS_KV"
id = "3acee39af5ef4824b289311f52ad3531"

# Drafts store — persists blog post drafts authored in the /admin/write
# editor on sajivfrancis.com. Owner-only. Each draft is a JSON record
# with frontmatter + markdown body. Read/write via /api/drafts/* endpoints.
# Create the namespace before first deploy:
#   npx wrangler kv:namespace create DRAFTS_KV
# Then replace the placeholder id below with the value wrangler prints.
[[kv_namespaces]]
binding = "DRAFTS_KV"
id = "REPLACE_WITH_DRAFTS_KV_ID"

# Repo grounding cache — caches GitHub-fetched repo contents used as
# grounding context for /api/drafts/:id/review. Keyed by `{repo}:{sha}`
# with a 1-hour TTL. Cache miss falls through to a live fetch.
# Create the namespace before first deploy:
#   npx wrangler kv:namespace create REPO_CACHE_KV
# Then replace the placeholder id below with the value wrangler prints.
[[kv_namespaces]]
binding = "REPO_CACHE_KV"
id = "REPLACE_WITH_REPO_CACHE_KV_ID"

# Secrets — set via:
#   cd worker && npx wrangler secret put ANTHROPIC_API_KEY
#   cd worker && npx wrangler secret put OPENAI_API_KEY  (Saturday)
#
# Optional: 1M-context beta enabler. Set the Anthropic beta header value
# to allow direct-injection turns with > 175k tokens of pinned source
# content (cross-book SAP Press synthesis, etc). When unset, worker
# caps full-injection at 175k and falls back to top-K above that.
# Pricing: ~2× standard input rate for prompts > 200k.
#   cd worker && npx wrangler secret put ANTHROPIC_BETA_1M
# (paste the current beta name from Anthropic docs, e.g.
#  "context-1m-2025-08-07" — check console.anthropic.com for the
#  current dated value at time of enabling.)
#
# Optional: GitHub PAT for the "Publish to docs" feature. Needed for
# POST /publish-to-docs to commit synthesized whitepapers (refs stripped,
# rewritten to first-person via Haiku) into sfrancis2017/docs at
# src/content/docs/analysis/<slug>.md. When unset, /publish-to-docs
# returns 503 with a config hint.
#   cd worker && npx wrangler secret put DOCS_GITHUB_TOKEN
# (paste a fine-grained PAT with contents:write scoped to the docs repo
#  only — generate at github.com/settings/personal-access-tokens.)
